      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RepairRequestSearchRequest'
            examples:
              dateRange:
                value:
                  pageNumber: 1
                  pageSize: 10
                  orderBy: currentStatusOrderSequence asc
                  search:
                    - name: requested_at
                      condition: GREATEROREQUAL
                      value: '2026-04-01T00:00:00+07:00'
                    - name: requested_at
                      condition: LESSEROREQUAL
                      value: '2026-04-30T23:59:59+07:00'
      responses:
        '200':
          description: Grouped repair request counts by status
          headers:
            X-Pagination:
              $ref: '#/components/headers/PaginationHeader'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RepairRequestGroupByStatusReport'
              examples:
                success:
                  value:
                    - statusName: Open
                      value: 12
                    - statusName: In Progress
                      value: 7
                    - statusName: Done
                      value: 20
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
