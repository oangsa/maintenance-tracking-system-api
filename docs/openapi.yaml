openapi: 3.0.3
info:
  title: Maintenance Tracking System API
  version: 1.0.0
  description: REST API built with Elysia and Drizzle ORM.
servers:
  - url: http://localhost:3000
    description: Local development
  - url: /
    description: Relative URL server
tags:
  - name: Authentications
    description: Authentication endpoints
  - name: Users
    description: User management endpoints
  - name: Departments
    description: Department management endpoints
  - name: Parts
    description: Part management endpoints
  - name: Repair Status
    description: Repair status management endpoints
  - name: Repair Request Item Statuses
    description: Repair request item status management endpoints
  - name: Repair Requests
    description: Repair request management endpoints
  - name: Product Types
    description: Product type management endpoints
  - name: Products
    description: Product management endpoints
  - name: Inventory Moves
    description: Inventory movement management endpoints
  - name: WorkOrders
    description: Work order management endpoints
  - name: Work Order Parts
    description: Work order part management endpoints
  - name: WorkTasks
    description: Work task management endpoints
  - name: Versioning
    description: API version discovery endpoints
paths:
  /api/versions:
    get:
      tags:
        - Versioning
      summary: Get supported API versions
      operationId: getApiVersions
      responses:
        '200':
          description: Supported API versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionDiscoveryResponse'

  /api/v1/authentication/login:
    post:
      tags:
        - Authentications
      summary: Login user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie in format refresh_token=<tokenId.rawToken>
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/authentication/refresh:
    post:
      tags:
        - Authentications
      summary: Refresh access token
      operationId: refreshAccessToken
      security:
        - refreshTokenCookie: []
      responses:
        '200':
          description: Access token refreshed
          headers:
            Set-Cookie:
              description: Rotated HttpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/authentication/logout:
    post:
      tags:
        - Authentications
      summary: Logout current device
      operationId: logoutCurrentDevice
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/authentication/logout-all:
    post:
      tags:
        - Authentications
      summary: Logout all devices
      operationId: logoutAllDevices
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out from all devices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/users/search:
    post:
      tags:
        - Users
      summary: Search users
      operationId: searchUsers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
