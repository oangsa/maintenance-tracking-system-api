components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token

  parameters:
    IdPathParam:
      name: id
      in: path
      required: true
      description: Numeric identifier
      schema:
        type: string
        pattern: '^[0-9]+$'

  headers:
    PaginationHeader:
      description: JSON string containing pagination metadata
      schema:
        type: string
        example: '{"currentPage":1,"totalPages":10,"pageSize":10,"totalCount":100,"hasPrevious":false,"hasNext":true}'

  responses:
    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    VersionDiscoveryResponse:
      type: object
      required:
        - supportedVersions
        - defaultVersion
      properties:
        supportedVersions:
          type: array
          items:
            type: string
          example:
            - v1
        defaultVersion:
          type: string
          example: v1

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 150
        password:
          type: string
          minLength: 6

    LoginResponse:
      type: object
      required:
        - accessToken
        - user
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/User'

    RefreshResponse:
      type: object
      required:
        - accessToken
      properties:
        accessToken:
          type: string

    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      required:
        - statusCode
        - message
        - error
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: Bad Request
        error:
          type: string
          example: Bad Request
        stack:
          type: string
          nullable: true

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            details:
              type: array
              items:
                type: object
                additionalProperties: true

    Role:
      type: string
      enum:
        - admin
        - manager
        - employee

    Priority:
      type: string
      enum:
        - low
        - medium
        - high
        - urgent

    SearchCondition:
      type: object
      required:
        - name
        - condition
        - value
      properties:
        name:
          type: string
          description: The name of the search condition
        condition:
          type: string
          description: The condition to apply to the search
          enum:
            - CONTAINS
            - STARTWITH
            - ENDWITH
            - GREATER
            - LESSER
            - GREATEROREQUAL
            - LESSEROREQUAL
            - EQUAL
            - NOTEQUAL
            - ISNULL
            - ISNOTNULL
        value:
          type: string
          description: The value to search for

    SearchTerm:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
          description: The field(s) to search, supports dot notation and comma-separated values
        value:
          type: string
          description: The value to search for

    SearchRequestBase:
      type: object
      properties:
        pageNumber:
          type: number
          minimum: 1
          default: 1
          description: The page number to retrieve
        pageSize:
          type: number
          minimum: 1
          maximum: 100
          default: 10
          description: The number of items per page
        orderBy:
          type: string
          description: The field to order by
        search:
          type: array
          items:
            $ref: '#/components/schemas/SearchCondition'
        searchTerm:
          $ref: '#/components/schemas/SearchTerm'
        deleted:
          type: boolean
          default: false

    DeleteCollectionRequest:
      type: object
      required:
        - ids
      properties:
        ids:
          type: array
          minItems: 1
          items:
            type: string
            pattern: '^[0-9]+$'

    UserSearchRequest:
      allOf:
        - $ref: '#/components/schemas/SearchRequestBase'

    DepartmentSearchRequest:
      allOf:
        - $ref: '#/components/schemas/SearchRequestBase'

    PartSearchRequest:
