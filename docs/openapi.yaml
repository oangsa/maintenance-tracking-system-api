                  value:
                    id: 5
                    code: P-001
                    name: Battery Pack
                    productTypeId: 2
                    productTypeCode: PT-02
                    productTypeName: Accessories
                    totalStock: 18
                    createdAt: '2026-05-01T10:00:00+07:00'
